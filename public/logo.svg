<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 60">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a3a3a3"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Dark background to make it visible everywhere (like README) -->
  <rect width="100%" height="100%" fill="transparent" />

  <g transform="translate(15, 42)">
    <!-- ZIV -->
    <text x="0" y="0" font-family="'Inter', system-ui, -apple-system, sans-serif" font-weight="900" font-size="36" fill="url(#textGrad)" letter-spacing="-1.5">ZIV</text>
    
    <!-- Glowing O -->
    <circle cx="72" cy="-12" r="10.5" fill="none" stroke="#e50914" stroke-width="3" filter="url(#glow)"/>
    
    <!-- X -->
    <text x="91" y="0" font-family="'Inter', system-ui, -apple-system, sans-serif" font-weight="900" font-size="36" fill="url(#textGrad)" letter-spacing="-1.5">X</text>
  </g>
</svg>
